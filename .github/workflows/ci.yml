name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: source-hunter run --json | tee output.json
      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/*.json output.json
          if git diff --cached --quiet; then
            echo "No output changes."
          else
            git commit -m "Update source hunter outputs"
            git push
          fi
      - name: Optional sync
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
          TARGET_PATH: ${{ secrets.TARGET_PATH }}
        run: python -m source_hunter.sync_registry || true
      - uses: actions/upload-artifact@v4
        with:
          name: source-hunter-output
          path: |
            output.json
            registry/*.json
