name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          git clone --depth 1 https://github.com/mehdimt1980/v2ray-finder.git "$RUNNER_TEMP/v2ray-finder"
          echo "HUNTER_V2RAY_FINDER_PATH=$RUNNER_TEMP/v2ray-finder" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$RUNNER_TEMP/v2ray-finder:$PYTHONPATH" >> "$GITHUB_ENV"

      - name: Install Xray
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/xray"
          curl -L --fail --retry 3 -o "$RUNNER_TEMP/xray/xray.zip" "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          unzip -o "$RUNNER_TEMP/xray/xray.zip" -d "$RUNNER_TEMP/xray"
          chmod +x "$RUNNER_TEMP/xray/xray"
          "$RUNNER_TEMP/xray/xray" version
          echo "XRAY_BINARY=$RUNNER_TEMP/xray/xray" >> "$GITHUB_ENV"
          echo "HUNTER_REAL_CHECK=1" >> "$GITHUB_ENV"
          echo "HUNTER_REAL_CHECK_LOCATION=github_actions_eu" >> "$GITHUB_ENV"

      - name: Run source hunter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUNTER_AUTO_DISCOVER: "1"
        run: |
          set -euxo pipefail
          source-hunter run --max-candidates 120 --preflight-scan-limit 700 --json 2>&1 | tee output.json
          python -c "import json, pathlib, sys; report=json.loads(pathlib.Path('registry/hunt_report.json').read_text(encoding='utf-8')); app=json.loads(pathlib.Path('registry/v2ray_finder_sources.json').read_text(encoding='utf-8')); checks=[r.get('diagnostics',{}).get('real_check',{}) for k in ('trusted','candidates','experimental','redundant','rejected') for r in report.get(k,[])]; assert report.get('generated_at') and app, 'source hunter did not regenerate app registry output'; assert any(c.get('available') for c in checks), 'real validation was requested but unavailable'; print('app registry records:', len(app), 'generated_at:', report['generated_at'], 'real checks:', sum(1 for c in checks if c.get('available')))"
          python -m source_hunter.quality_gate

      - name: Commit outputs
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry output.json

          if git diff --cached --quiet; then
            echo "No output changes."
            exit 0
          fi

          branch="${GITHUB_REF_NAME:-main}"
          git fetch origin "$branch"

          if git rebase --autostash "origin/$branch"; then
            git add registry output.json
            if git diff --cached --quiet; then
              echo "No output changes after rebase."
              exit 0
            fi
            git commit -m "Update source hunter outputs"
            git push origin "HEAD:$branch"
          else
            echo "Rebase failed; aborting and skipping output push to avoid conflicts."
            git rebase --abort || true
            exit 0
          fi

      - name: Sync Android registry
        env:
          TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_REPO: mehdimt1980/v2ray-finder
          TARGET_PATH: registry/sources.json
        run: python -m source_hunter.sync_registry

      - uses: actions/upload-artifact@v4
        with:
          name: source-hunter-output
          path: |
            output.json
            registry

      - name: Send Telegram report
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HUNTER_CI_STATUS: ${{ job.status }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            python -m source_hunter.telegram_report --send --no-fail
          else
            echo "Telegram secrets missing; printing report preview only."
            python -m source_hunter.telegram_report || true
          fi
