name: Telegram Test

on:
  workflow_dispatch:

jobs:
  telegram-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install source hunter
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Send Telegram test report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HUNTER_CI_STATUS: test
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret."
            exit 1
          fi
          python -m source_hunter.telegram_report --send
